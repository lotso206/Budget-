function guessEmoji(label) {
  const l = label.toLowerCase();
  if (l.includes("disney"))    return "🎬";
  if (l.includes("netflix"))   return "🎬";
  if (l.includes("prime"))     return "📦";
  if (l.includes("canal"))     return "📺";
  if (l.includes("spotify"))   return "🎵";
  if (l.includes("deezer"))    return "🎵";
  if (l.includes("électricité")||l.includes("electricite")||l.includes("octopus")||l.includes("enedis")||l.includes("edf")) return "⚡";
  if (l.includes("gaz"))       return "🔥";
  if (l.includes("eau"))       return "💧";
  if (l.includes("internet")||l.includes("fibre")||l.includes("box")) return "📡";
  if (l.includes("téléphone")||l.includes("mobile")||l.includes("bouygues")||l.includes("sfr")||l.includes("orange")||l.includes("free")) return "📱";
  if (l.includes("assurance voiture")||l.includes("matmut")||l.includes("maif")||l.includes("axa")) return "🚗";
  if (l.includes("assurance vie")) return "🛡️";
  if (l.includes("assurance maison")||l.includes("habitation")) return "🏠";
  if (l.includes("assurance")) return "🛡️";
  if (l.includes("mutuelle")||l.includes("santé")||l.includes("sante")) return "💊";
  if (l.includes("espèces")||l.includes("especes")||l.includes("cash")||l.includes("liquide")) return "💵";
  if (l.includes("courses")||l.includes("supermarché")||l.includes("carrefour")||l.includes("lidl")||l.includes("leclerc")||l.includes("aldi")||l.includes("intermarché")||l.includes("marché")) return "🛒";
  if (l.includes("livret")||l.includes("pel")||l.includes("cel")) return "🏦";
  if (l.includes("restaurant")||l.includes("resto")) return "🍽️";
  if (l.includes("cinéma")||l.includes("cinema")) return "🎥";
  if (l.includes("école")||l.includes("ecole")||l.includes("cantine")) return "🎓";
  if (l.includes("sport")||l.includes("salle")||l.includes("gym")) return "🏋️";
  if (l.includes("voyage")||l.includes("vacances")||l.includes("hotel")) return "✈️";
  if (l.includes("vêtement")||l.includes("vetement")) return "👕";
  if (l.includes("enfant")||l.includes("bébé")||l.includes("jouet")) return "👶";
  if (l.includes("cadeau")) return "🎁";
  if (l.includes("coiffeur")) return "💇";
  if (l.includes("médecin")||l.includes("dentiste")) return "🏥";
  if (l.includes("taxe")||l.includes("impôt")) return "📄";
  return "💳";
}

function formatDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0)  return { label:"Aujourd'hui", urgent:true };
  if (diff === 1)  return { label:"Demain",      urgent:true };
  if (diff === -1) return { label:"Hier",        urgent:true };
  if (diff < 0)   return { label:`En retard (${Math.abs(diff)}j)`, urgent:true };
  if (diff <= 3)  return { label:`Dans ${diff}j`, urgent:true };
  return { label:d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"}), urgent:false };
}

function sumBucket(items, key) {
  return items.filter(i=>i.bucket===key).reduce((s,i)=>s+i.amount,0);
}

            <select value={form.bucket} onChange={e=>setForm({...form,bucket:e.target.value})}
              style={{ width:"100%", padding:"11px 13px", borderRadius:11, border:"1px solid #E8E4F3", fontFamily:"DM Sans", fontSize:14, marginBottom:9, boxSizing:"border-box", color:"#3D3D5C", background:"#fff" }}>
              <option value="obligatoires">🏠 Dépenses obligatoires</option>
              <option value="loisirs">🎉 Loisirs & envies</option>
              <option value="epargne">🏦 Épargne · Livret A</option>
              <option value="especes">💵 Épargne · Espèces</option>
            </select>
            <input type="date" value={form.dueDate} onChange={e=>setForm({...form,dueDate:e.target.value})}
              style={{ width:"100%", padding:"11px 13px", borderRadius:11, border:"1px solid #E8E4F3", fontFamily:"DM Sans", fontSize:14, marginBottom:16, boxSizing:"border-box", color:"#3D3D5C" }}/>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>setShowForm(false)} style={{ flex:1, padding:12, borderRadius:13, border:"1px solid #E8E4F3", background:"#fff", fontFamily:"DM Sans", fontSize:14, color:"#9B97B8", cursor:"pointer" }}>Annuler</button>
              <button onClick={addItem} style={{ flex:2, padding:12, borderRadius:13, border:"none", background:"#E8E4F3", fontFamily:"DM Sans", fontSize:14, fontWeight:600, color:"#6B5FD8", cursor:"pointer" }}>Ajouter</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(BudgetApp));
  </script>
</body>
</html>
